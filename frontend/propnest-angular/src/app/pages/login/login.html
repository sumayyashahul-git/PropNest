<div class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800">🏠 PropNest</h1>
      <p class="text-slate-500 mt-2 text-sm">Admin Portal — Sign in to continue</p>
    </div>

    <!-- Error -->
    <div *ngIf="error"
      class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 text-sm">
      {{ error }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Email Address
        </label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@propnest.ae"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-red-400"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Password
        </label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm
                 focus:outline-none focus:ring-2 focus:ring-red-400"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-red-500 hover:bg-red-600 disabled:bg-red-300
               text-white font-semibold py-3 rounded-lg transition-colors text-sm">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

  </div>
</div>
